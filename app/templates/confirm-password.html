{% extends 'base.html' %}
{% load static %}

{% block content %}

    <main class="page-section">
        <div class="container auth-wrapper">
            <div class="auth-card" style="text-align:center;">
                <div style="width:70px; height:70px; background: var(--bg-light); color: var(--primary); border-radius: 50%; display:flex; align-items:center; justify-content:center; font-size:2rem; margin:0 auto 20px;">
                    <i class="fa-regular fa-envelope"></i>
                </div>
                <h1>Emailni tasdiqlash</h1>
                <p class="subtitle">Pochtangizga yuborilgan 6 xonali kodni kiriting</p>

                <form data-toast="Hisobingiz muvaffaqiyatli tasdiqlandi!" data-redirect="login.html"
                method="post" action="{% url 'verify-email' %}">
                    {% csrf_token %}
                    <div class="form-group mb-2">
                        <input type="text" name="code" required placeholder="___ ___"
                               style="text-align:center; font-size:1.5rem; letter-spacing:5px; font-weight:700;">
                    </div>
                    <button type="submit" class="btn btn-accent"
                            style="width:100%; margin-top:15px; font-size:1.1rem; padding:14px;">Tasdiqlash
                    </button>
                </form>

                <p style="margin-top:20px; font-size:0.9rem; color:var(--text-gray);">Kod kelmadimi? <a href="#"
                                                                                                        class="auth-link"
                                                                                                        style="margin-top:0;"
                                                                                                        onclick="event.preventDefault(); app.toast('Kod qayta yuborildi!')">Qayta
                    yuborish</a></p>
            </div>
        </div>
    </main>

{% endblock content %}
