{% extends 'base.html' %}
{% load static %}

{% block content %}

<main class="page-section">
    <div class="container auth-wrapper">
        <div class="auth-card">
            <h1>Parolni tiklash</h1>
            <p class="subtitle">Email manzilingizni kiriting, biz sizga tiklash havolasini yuboramiz</p>

            <form data-toast="Parolni tiklash kodi yuborildi!" data-redirect="reset-password.html"
            action="{% url 'forgot-password' %}" method="post">
                {% csrf_token %}
                <div class="form-group mb-2">
                    <label>Email manzilingiz</label>
                    <input type="email" name="email" required placeholder="misol@gmail.com">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; margin-top:15px; font-size:1.1rem; padding:14px;">Kodni yuborish</button>
            </form>

            <div style="text-align:center; margin-top:20px;">
                <a href="login.html" class="auth-link" style="color: var(--text-gray);"><i class="fa-solid fa-arrow-left"></i> Orqaga qaytish</a>
            </div>
        </div>
    </div>
</main>
{% endblock content %}
