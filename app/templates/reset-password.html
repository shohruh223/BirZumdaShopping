{% extends 'base.html' %}
{% load static %}

{% block content %}

<main class="page-section">
    <div class="container auth-wrapper">
        <div class="auth-card">
            <h1>Yangi parol</h1>
            <p class="subtitle">Hisobingiz uchun yangi xavfsiz parol o'rnating</p>

            <form data-toast="Parol muvaffaqiyatli o'zgartirildi!" data-redirect="login.html"
            method="post" action="{% url 'reset-password' %}">
                {% csrf_token %}
                <div class="form-group mb-2">
                    <label>Tasdiqlash kodi</label>
                    <input type="text" name="code" required placeholder="Emailga kelgan kod">
                </div>
                <div class="form-group mb-2">
                    <label>Yangi parol</label>
                    <input type="password" name="password" required placeholder="Yangi parolni kiriting">
                </div>
                <div class="form-group mb-2">
                    <label>Parolni tasdiqlang</label>
                    <input type="password" name="confirm_password" required placeholder="Yangi parolni qayta kiriting">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; margin-top:15px; font-size:1.1rem; padding:14px;">Saqlash va Kirish</button>
            </form>

        </div>
    </div>
</main>
{% endblock content %}
